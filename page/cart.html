<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico" />
    <title>PQ Store</title>
    <!-- fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
    />
    <!-- reset css cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <!-- font roboto cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <!-- assets -->
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/cart.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
    <!-- axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- JS -->
    <script src="../js/main.js"></script>
    <script src="../js/cart.js"></script>
  </head>

  <body>
    <header class="header"></header>

    <!-- container -->
    <main class="container mgt-header">
      <div class="row js-no-cart">
        <!-- giỏ hàng chưa có sản phẩm -->
        <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
          <div class="no-cart">
            <img class="no-cart__img" src="../assets/img/no-cart.png" alt="" />
            <h3 class="no-cart__title">Giỏ hàng chưa có sản phẩm nào</h3>
          </div>
        </div>
      </div>
      <div class="row js-has-cart">
        <!-- giỏ hàng đã có sản phẩm -->
        <div class="col-12 col-sm-12 col-md-12 col-lg-9 col-xl-9 col-xxl-9">
          <div class="row justify-content-between align-items-center">
            <div class="col-4 col-sm-4 col-md-4 col-lg-4 col-xl-4 col-xxl-4">
              <div class="cart__item__checkbox justify-content-start">
                <input type="checkbox" name="" id="check-all-product" />
                <label for="check-all-product" class="cart-check-all-lb"
                  >Chọn tất cả<span></span
                ></label>
              </div>
            </div>
            <div
              class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3 justify-content-end d-flex"
            >
              <button class="cart__header__remove-all button">
                <i class="fa-solid fa-trash-can"></i>Xóa tất cả
              </button>
            </div>
          </div>
          <div class="row g-3 js-has-cart-product">
            <div
              class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 border border-warning p-3 bg-secondary"
            >
              <div class="row g-1">
                <div
                  class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 col-xxl-1 d-flex"
                >
                  <div class="cart__item__checkbox">
                    <input type="checkbox" name="" id="check-product2" />
                    <label for="check-product2" class="cart__item__check-label"
                      ><span></span
                    ></label>
                  </div>
                </div>
                <div
                  class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 col-xxl-1"
                >
                  <a href="" class="cart__item__img"><img src="" alt="" /></a>
                </div>
                <div
                  class="col-4 col-sm-4 col-md-4 col-lg-4 col-xl-4 col-xxl-4"
                >
                  <span class="cart__item__name"
                    >Bộ nhớ/ Ram Desktop ADATA XPG D50 DDR4 8GB (1x8GB) 3200 RGB
                    Grey (AX4U32008G16A)</span
                  >
                </div>
                <div
                  class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2 justify-content-center d-flex"
                >
                  <div class="cart__item__unit-price">
                    <div class="discount">999.999đ</div>
                    <div class="price">1.020.000đ</div>
                  </div>
                </div>
                <div
                  class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2"
                >
                  <div class="cart__item__quantity">
                    <header class="cart__item__quantity__header">
                      <button class="quantity__decrease">-</button>
                      <div class="quantity__number">1</div>
                      <button class="quantity__increase">+</button>
                    </header>
                    <div class="quantity__delete">Xóa</div>
                  </div>
                </div>
                <div
                  class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2 justify-content-center d-flex"
                >
                  <div class="cart__item__total-price">12304148</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-12 col-md-12 col-lg-3 col-xl-3 col-xxl-3">
          <div class="pay-container">
            <h1 class="pay__title">Thanh toán</h1>
            <div class="pay__row">
              <span>Tổng tiền:</span>
              <span>0.00đ</span>
            </div>
            <div class="pay__row">
              <span>Giảm:</span>
              <span>0.00đ</span>
            </div>
            <div class="pay__row">
              <h3>Cần thanh toán:</h3>
              <h4>0.00đ</h4>
            </div>
            <button class="pay__button button">Thanh toán</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer page-section"></footer>

    <div class="copyright"></div>

    <form
      id="account-form"
      class="sign-iu-form__overlay js-sign-iu-overlay"
      action=""
    ></form>

    <script>
      cartEventFull();
    </script>
  </body>
</html>
