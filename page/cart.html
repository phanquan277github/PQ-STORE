<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQ Store</title>
    <!-- fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <!-- reset css cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <!-- font roboto cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <!-- assets -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/grid.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/cart.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <!-- JS -->
    <script src="../../data/dataProducts.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/spotlight.js"></script>
</head>

<body>
    <script> addHeader() </script>

    <!-- container -->
    <main class="container mgt-header">
        <div class="grid wide">
            <div class="row js-no-cart">
                <!-- giỏ hàng chưa có sản phẩm -->
                <div class="col l-12 m-12 c-12">
                    <div class="no-cart">
                        <img class="no-cart__img" src="../assets/img/no-cart.png" alt="">
                        <h3 class="no-cart__title">Giỏ hàng chưa có sản phẩm nào</h3>
                    </div>
                </div>
            </div>
            <div class="row js-has-cart">
                <!-- giỏ hàng đã có sản phẩm -->
                <div class="col l-8 m-12 c-12">
                    <header class="cart__header">
                        <div class="cart__item__checkbox">
                            <input type="checkbox" name="" id="check-all-product">
                            <label for="check-all-product" class="cart__item__check-label">  Chọn tất cả<span></span></label>
                        </div>
                        <button class="cart__header__remove-all button"><i class="fa-solid fa-trash-can"></i>Xóa tất cả</button>
                    </header>
                    <div class="cart__content">
                        <div class="cart__item">
                            <div class="cart__item__checkbox">
                                <input type="checkbox" name="" id="check-product2">
                                <label for="check-product2" class="cart__item__check-label"><span></span></label>
                            </div>
                            <a href="" class="cart__item__img"><img src="../assets/img/nitro5-img.png" alt=""></a>
                            <span class="cart__item__name">Bộ nhớ/ Ram Desktop ADATA XPG D50 DDR4 8GB (1x8GB) 3200 RGB Grey (AX4U32008G16A)</span>
                            <div class="cart__item__unit-price">
                                <div class="discount">999.999đ</div>
                                <div class="price">1.020.000đ</div>
                            </div>
                            <div class="cart__item__quantity">
                                <header class="cart__item__quantity__header">
                                    <button class="quantity__decrease">-</button>
                                    <div class="quantity__number">1</div>
                                    <button class="quantity__increase">+</button>
                                </header>
                                <div class="quantity__delete">Xóa</div>
                            </div>
                            <div class="cart__item__total-price">12304148</div>
                        </div>
                    </div>
                </div>
                <div class="col l-4 m-12 c-12">
                    <div class="pay-container">
                        <h1 class="pay__title">Thanh toán</h1>
                        <div class="pay__row">
                            <span>Tổng tiền:</span>
                            <span>0.00đ</span>
                        </div>
                        <div class="pay__row">
                            <span>Giảm:</span>
                            <span>0.00đ</span>
                        </div>
                        <div class="pay__row">
                            <h3>Cần thanh toán:</h3>
                            <h4>0.00đ</h4>
                        </div>
                        <button class="pay__button button">Thanh toán</button>
                    </div>
                </div></div>
        </div>
    </main>

    <script> addFooter() </script>
    <!-- sign in on from -->
    <script> addAccountForm(); accountEvent(); </script>
    <script>cartEvent()</script>
    <script>renderCartNum()</script>
</body>

</html>
